<!DOCTYPE html>
<html>
<head>
<title>Newton Backward Interpolation</title>
<link rel="stylesheet" href="/static/Newton Backward Interpolation.css">
</head>

<body>

<h1>Newton Backward Interpolation Calculator</h1>

Number of Data Points :
<input type="number" id="points">
<button onclick="createTable()">Create Table</button>

<br><br>

<div id="tableArea"></div>

<br>

Value of x to find y :
<input id="xvalue">

<br><br>

<button onclick="solve()">Solve</button>

<h2>Result</h2>
<div id="output"></div>

<script>

function createTable(){

let n=document.getElementById("points").value
let table="<table border='1'><tr><th>x</th><th>y</th></tr>"

for(let i=0;i<n;i++){

table+=`<tr>
<td><input id="x${i}"></td>
<td><input id="y${i}"></td>
</tr>`

}

table+="</table>"

document.getElementById("tableArea").innerHTML=table

}

function solve(){

let n=document.getElementById("points").value

let x=[]
let y=[]

for(let i=0;i<n;i++){

x[i]=parseFloat(document.getElementById("x"+i).value)
y[i]=parseFloat(document.getElementById("y"+i).value)

}

let value=parseFloat(document.getElementById("xvalue").value)

let diff=[]
for(let i=0;i<n;i++) diff[i]=[]

for(let i=0;i<n;i++) diff[i][0]=y[i]

for(let j=1;j<n;j++){

for(let i=n-1;i>=j;i--){

diff[i][j]=diff[i][j-1]-diff[i-1][j-1]

}

}

let h=x[1]-x[0]
let p=(value-x[n-1])/h

let result=y[n-1]
let pterm=1
let fact=1

for(let i=1;i<n;i++){

pterm*= (p+i-1)
fact*=i

result+= (pterm*diff[n-1][i])/fact

}

document.getElementById("output").innerHTML=
"Interpolated Value = "+result

}

</script>

</body>
</html>
