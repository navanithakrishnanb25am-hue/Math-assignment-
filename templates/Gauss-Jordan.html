<!DOCTYPE html>
<html>
<head>
<title>Gauss Jordan Solver</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Gauss-Jordan Equation Solver</h1>

<p>Enter equations:</p>

<input id="eq1" placeholder="x + y + z = 9"><br>
<input id="eq2" placeholder="2x - 3y + 4z = 13"><br>
<input id="eq3" placeholder="3x + 4y + 5z = 40"><br><br>

<button onclick="solve()">Solve</button>

<h2 id="result"></h2>

<script>

function parse(eq){

eq = eq.replace(/\s+/g,'');

let parts = eq.split('=');

let left = parts[0];
let right = parseFloat(parts[1]);

let x = parseFloat((left.match(/[-+]?\d*\.?\d*x/)||["0"])[0].replace('x','')) || 1;
let y = parseFloat((left.match(/[-+]?\d*\.?\d*y/)||["0"])[0].replace('y','')) || 1;
let z = parseFloat((left.match(/[-+]?\d*\.?\d*z/)||["0"])[0].replace('z','')) || 1;

return [x,y,z,right];

}

function solve(){

let e1=parse(document.getElementById("eq1").value);
let e2=parse(document.getElementById("eq2").value);
let e3=parse(document.getElementById("eq3").value);

let a11=e1[0],a12=e1[1],a13=e1[2],b1=e1[3];
let a21=e2[0],a22=e2[1],a23=e2[2],b2=e2[3];
let a31=e3[0],a32=e3[1],a33=e3[2],b3=e3[3];

let D = a11*(a22*a33-a23*a32)
       -a12*(a21*a33-a23*a31)
       +a13*(a21*a32-a22*a31);

let Dx = b1*(a22*a33-a23*a32)
       -a12*(b2*a33-a23*b3)
       +a13*(b2*a32-a22*b3);

let Dy = a11*(b2*a33-a23*b3)
       -b1*(a21*a33-a23*a31)
       +a13*(a21*b3-b2*a31);

let Dz = a11*(a22*b3-b2*a32)
       -a12*(a21*b3-b2*a31)
       +b1*(a21*a32-a22*a31);

let x=Dx/D;
let y=Dy/D;
let z=Dz/D;

document.getElementById("result").innerHTML=
"x = "+x+"<br>y = "+y+"<br>z = "+z;

}

</script>

</body>
</html>
